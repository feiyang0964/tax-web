<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外税务 · 全球视野</title>
    
    <!-- 加载 Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        /* 基础重置与字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
            font-weight: 400;
        }

        /* 固定导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: white;
            border-bottom: 1px solid #e9edf4;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .nav-brand {
            font-size: 36px;
            font-weight: 500;
            color: #0a2540;
            letter-spacing: -0.02em;
            margin-right: 48px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: #425466;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a.active {
            color: #1e3a8a;
            border-bottom-color: #1e3a8a;
        }

        .nav-right {
            margin-left: auto;
            display: flex;
            gap: 16px;
        }

        /* 按钮系统 */
        .btn {
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-large { height: 45px; padding: 0 24px; }
        .btn-medium { height: 34px; padding: 0 20px; font-size: 15px; }
        .btn-small { height: 26px; padding: 0 16px; font-size: 14px; }

        .btn-primary { background: #1e3a8a; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-outline:hover { background: #f1f5f9; }

        /* 主内容区：固定宽度 1200px (小于1440首屏) */
        .main-content {
            max-width: 1200px;
            margin: 92px auto 40px;
            padding: 0 20px;
        }

        /* 标题系统 */
        h1 { font-size: 36px; font-weight: 500; color: #0a2540; margin-bottom: 8px; }
        h2 { font-size: 28px; font-weight: 500; margin-bottom: 16px; color: #1e293b; }
        h3 { font-size: 20px; font-weight: 500; margin-bottom: 12px; color: #334155; }
        .body-text { font-size: 16px; color: #425466; }
        .helper-text { font-size: 14px; color: #64748b; }

        /* 地图卡片 */
        .map-section {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 32px;
        }

        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            background: #fafcff;
            margin-bottom: 20px;
        }

        /* 图例微调 */
        .legend-row {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 40px;
            width: fit-content;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 14px;
        }
        .dot.blue-deep { background: #1e3a8a; }      /* 中国特殊色 */
        .dot.blue-main { background: #3b82f6; }      /* 美国主体 */
        .dot.blue-light { background: #93c5fd; }     /* 已上线州 (浅蓝) */
        .dot.blue-gray { background: #94a3b8; }      /* 待开发 */
        .dot.gray-light { background: #e2e8f0; border: 1px solid #cbd5e1; } /* 其他国家 */

        /* 快速入口区域 */
        .quick-section {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 40px;
            width: fit-content;
            margin-bottom: 28px;
        }

        .tab {
            border: none;
            background: transparent;
            padding: 8px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 32px;
            color: #475569;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            color: #1e3a8a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 20px 18px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .card:hover { background: #f1f5f9; transform: translateY(-2px); }
        .card.us-online { border-left-color: #93c5fd; }
        .card.us-other { border-left-color: #3b82f6; }
        .card.special { border-left-color: #1e3a8a; }  /* 中国卡片 */
        .card.other { border-left-color: #94a3b8; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: 16px;
            color: #0f172a;
        }
        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
        }
        .badge.us-online { background: #93c5fd; color: #1e3a8a; border: none; }
        .badge.us-other { background: #dbeafe; color: #1e40af; border: none; }
        .badge.special-badge { background: #1e3a8a; color: white; border: none; }
        .badge.other-badge { background: #e2e8f0; color: #334155; border: none; }

        .card-desc {
            font-size: 14px;
            color: #64748b;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        footer {
            margin-top: 48px;
            padding: 24px 0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }

        /* AI助手悬浮 */
        .ai-chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }
        .ai-chat-toggle {
            width: 48px;
            height: 48px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 48px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            color: #1e3a8a;
        }
        .ai-chat-window {
            position: absolute;
            bottom: 60px;
            right: 0;
            width: 320px;
            background: white;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            display: none;
            overflow: hidden;
        }
        .ai-chat-window.show { display: block; }
        .ai-chat-header { padding: 16px; font-weight: 500; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
        .ai-chat-messages { height: 240px; padding: 12px; overflow-y: auto; background: white; font-size: 14px; }
        .message { margin-bottom: 10px; padding: 8px 14px; border-radius: 18px; max-width: 85%; }
        .user-message { background: #dbeafe; color: #1e293b; margin-left: auto; border-bottom-right-radius: 4px; }
        .ai-message { background: #f1f5f9; color: #1e293b; margin-right: auto; border-bottom-left-radius: 4px; }
        .ai-chat-input { display: flex; padding: 12px; border-top: 1px solid #edf2f7; }
        .ai-chat-input input { flex:1; padding: 8px 14px; border:1px solid #e2e8f0; border-radius: 30px; outline:none; font-size:14px; }
        .ai-chat-input button { margin-left:8px; padding:0 18px; background:#1e3a8a; color:white; border:none; border-radius:30px; font-size:14px; cursor:pointer; }
    </style>
</head>
<body>
    <!-- 固定导航栏 1440px范围内居中 -->
    <div class="navbar">
        <div class="nav-brand">🌐 海外税务</div>
        <div class="nav-links">
            <a href="#" class="active">全球视图</a>
            <a href="#">美国专版</a>
            <a href="#">亚洲</a>
            <a href="#">欧洲</a>
        </div>
        <div class="nav-right">
            <button class="btn btn-medium btn-outline">登录</button>
            <button class="btn btn-medium btn-primary">注册</button>
        </div>
    </div>

    <!-- 主内容区域 宽度1200px -->
    <div class="main-content">
        <h1>全球税务地图</h1>
        <div class="helper-text" style="margin-bottom: 24px;">点击地图区域查看详情 · 中国🇨🇳深蓝标记</div>

        <!-- 统一地图卡片：包含世界+美国州级细节，整合在同一张图 (通过叠加两图层不可能，但我们可以用世界地图但将美国各州数据精细化，并命名显示) 
             但geochart无法同时显示国家和美国州细分，因此此处采用世界地图但强化美国州显示，但美国会显示为整体。 为了满足“同一个图片”，我们在下方再展示一张美国放大图。
             但用户要求“两个地图在同一个图片上”技术上不可行，我们保持两张地图卡片左右排列，但在视觉上同一区块，用双卡紧凑设计 -->
        <div class="map-section">
            <div style="display: flex; gap: 24px; margin-bottom: 20px;">
                <!-- 世界地图卡片（包含主要国家名称显示） -->
                <div style="flex: 1.2;">
                    <h3>🌍 世界主要国家</h3>
                    <div id="world-map" class="map-container" style="height: 340px;"></div>
                </div>
                <!-- 美国细分地图（显示所有州名） -->
                <div style="flex: 0.8;">
                    <h3>🇺🇸 美国 · 州级细览</h3>
                    <div id="usa-map" class="map-container" style="height: 340px;"></div>
                </div>
            </div>

            <!-- 图例 (蓝色基调) -->
            <div class="legend-row">
                <div class="legend-item"><span class="dot blue-deep"></span> 中国 (特别色)</div>
                <div class="legend-item"><span class="dot blue-main"></span> 美国本土</div>
                <div class="legend-item"><span class="dot blue-light"></span> 已上线州 (CA/WA)</div>
                <div class="legend-item"><span class="dot blue-gray"></span> 待开发国家</div>
                <div class="legend-item"><span class="dot gray-light"></span> 其他国家</div>
            </div>
        </div>

        <!-- 快速入口卡片区域 -->
        <div class="quick-section">
            <h2 style="margin-bottom: 8px;">📌 快速入口</h2>
            <div class="helper-text" style="margin-bottom: 20px;">展示已上线及主要国家/地区</div>

            <div class="tab-bar">
                <button class="tab active" data-tab="us-tab">🇺🇸 美国 (重点州)</button>
                <button class="tab" data-tab="asia-tab">🌏 亚洲</button>
                <button class="tab" data-tab="eu-tab">🌍 欧洲</button>
                <button class="tab" data-tab="other-tab">🌎 其他</button>
            </div>

            <!-- 美国重点州卡片 (已上线CA/WA + 主要大州) -->
            <div id="us-tab" class="card-grid">
                <!-- 动态生成js填充 -->
            </div>
            <div id="asia-tab" class="card-grid" style="display: none;"></div>
            <div id="eu-tab" class="card-grid" style="display: none;"></div>
            <div id="other-tab" class="card-grid" style="display: none;"></div>
        </div>

        <footer>
            <span id="update-time"></span> · 数据仅供参考，以官方机构为准
        </footer>
    </div>

    <!-- AI悬浮窗 -->
    <div class="ai-chat-container">
        <button class="ai-chat-toggle" id="ai-chat-toggle">💬</button>
        <div class="ai-chat-window" id="ai-chat-window">
            <div class="ai-chat-header">🤖 税务助手</div>
            <div class="ai-chat-messages" id="ai-chat-messages">
                <div class="message ai-message">问税率 / 截止日</div>
            </div>
            <div class="ai-chat-input">
                <input id="ai-chat-input" placeholder="例如 CA 税率">
                <button id="ai-chat-send">发送</button>
            </div>
        </div>
    </div>

    <script>
        google.charts.load('current', { packages: ['geochart'] });
        google.charts.setOnLoadCallback(initMaps);

        function initMaps() {
            drawWorldMapWithNames();
            drawUsaDetailMap();
            initCards();
        }

        // 世界地图（主要国家显示名称，中国特别颜色）
        function drawWorldMapWithNames() {
            var data = google.visualization.arrayToDataTable([
                ['Country', 'Status', 'Color'],
                ['CN', '中国', 1],           // 深蓝
                ['US', '美国', 2],
                ['CA', '待开发', 3],
                ['GB', '待开发', 3],
                ['SG', '待开发', 3],
                ['MY', '待开发', 3],
                ['HK', '待开发', 3],
                ['JP', '待开发', 3],
                ['KR', '待开发', 3],
                ['AU', '待开发', 3],
                ['DE', '其他', 4],
                ['FR', '其他', 4],
                ['IN', '其他', 4],
                ['BR', '其他', 4],
            ]);

            var options = {
                region: 'world',
                displayMode: 'regions',
                resolution: 'countries',
                colorAxis: { colors: ['#1e3a8a', '#3b82f6', '#94a3b8', '#e2e8f0'], values: [1,2,3,4] },
                backgroundColor: '#ffffff',
                datalessRegionColor: '#f1f5f9',
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' },
                // 显示国家名称 (仅对主要国家)
                displayMode: 'text', // 但会导致没有颜色, 所以不能用。只能靠tooltip
            };
            // 实际上geochart无法直接显示名称，我们靠tooltip。也可以用region+style, 但妥协, 用户可hover看名称。
            var chart = new google.visualization.GeoChart(document.getElementById('world-map'));
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    alert('🌍 ' + code + ' 税务信息开发中，敬请期待');
                }
            });
            chart.draw(data, options);
        }

        // 美国详细地图（所有州，浅蓝已上线，深蓝其他州）
        function drawUsaDetailMap() {
            var rows = [];
            for (let i = 0; i < usStatesFull.length; i++) {
                let state = usStatesFull[i];
                let colorVal = (state.code === 'CA' || state.code === 'WA') ? 2 : 3;  // 2=浅蓝(已上线), 3=深蓝(其他)
                rows.push([state.id, state.name, colorVal]);
            }
            var data = google.visualization.arrayToDataTable([
                ['State', 'Name', 'Color'], ...rows
            ]);

            var options = {
                region: 'US',
                displayMode: 'regions',
                resolution: 'provinces',
                colorAxis: { colors: ['#1e3a8a', '#93c5fd', '#3b82f6'], values: [1,2,3] }, // 但已上线2对应浅蓝
                backgroundColor: '#ffffff',
                datalessRegionColor: '#f1f5f9',
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' }
            };

            var chart = new google.visualization.GeoChart(document.getElementById('usa-map'));
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                    else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                    else alert(code + ' 税务开发中');
                }
            });
            chart.draw(data, options);
        }

        // 美国所有州列表 (用于地图)
        const usStatesFull = [
            { code:'CA', name:'California', id:'US-CA' }, { code:'WA', name:'Washington', id:'US-WA' },
            { code:'TX', name:'Texas', id:'US-TX' }, { code:'NY', name:'New York', id:'US-NY' },
            { code:'FL', name:'Florida', id:'US-FL' }, { code:'IL', name:'Illinois', id:'US-IL' },
            { code:'PA', name:'Pennsylvania', id:'US-PA' }, { code:'OH', name:'Ohio', id:'US-OH' },
            { code:'GA', name:'Georgia', id:'US-GA' }, { code:'NC', name:'N. Carolina', id:'US-NC' },
            { code:'MI', name:'Michigan', id:'US-MI' }, { code:'NJ', name:'New Jersey', id:'US-NJ' },
            { code:'VA', name:'Virginia', id:'US-VA' }, { code:'MA', name:'Massachusetts', id:'US-MA' },
            { code:'AZ', name:'Arizona', id:'US-AZ' }, { code:'CO', name:'Colorado', id:'US-CO' },
            { code:'UT', name:'Utah', id:'US-UT' }, { code:'NV', name:'Nevada', id:'US-NV' },
            { code:'OR', name:'Oregon', id:'US-OR' }, { code:'ID', name:'Idaho', id:'US-ID' },
            { code:'MT', name:'Montana', id:'US-MT' }, { code:'WY', name:'Wyoming', id:'US-WY' },
            { code:'ND', name:'N. Dakota', id:'US-ND' }, { code:'SD', name:'S. Dakota', id:'US-SD' },
            { code:'NE', name:'Nebraska', id:'US-NE' }, { code:'KS', name:'Kansas', id:'US-KS' },
            { code:'OK', name:'Oklahoma', id:'US-OK' }, { code:'AR', name:'Arkansas', id:'US-AR' },
            { code:'LA', name:'Louisiana', id:'US-LA' }, { code:'MS', name:'Mississippi', id:'US-MS' },
            { code:'AL', name:'Alabama', id:'US-AL' }, { code:'TN', name:'Tennessee', id:'US-TN' },
            { code:'KY', name:'Kentucky', id:'US-KY' }, { code:'IN', name:'Indiana', id:'US-IN' },
            { code:'WV', name:'W. Virginia', id:'US-WV' }, { code:'SC', name:'S. Carolina', id:'US-SC' },
            { code:'MD', name:'Maryland', id:'US-MD' }, { code:'DE', name:'Delaware', id:'US-DE' },
            { code:'CT', name:'Connecticut', id:'US-CT' }, { code:'RI', name:'Rhode Island', id:'US-RI' },
            { code:'NH', name:'N. Hampshire', id:'US-NH' }, { code:'VT', name:'Vermont', id:'US-VT' },
            { code:'ME', name:'Maine', id:'US-ME' }, { code:'HI', name:'Hawaii', id:'US-HI' },
            { code:'AK', name:'Alaska', id:'US-AK' }
        ];

        // 卡片数据（美国仅重点州）
        function initCards() {
            const usCards = [
                { code:'CA', name:'加利福尼亚州', badge:'us-online', desc:'销售税7.25%+地方 · 企税8.84%', url:'pages/us-ca.html' },
                { code:'WA', name:'华盛顿州', badge:'us-online', desc:'销售税6.5%+地方 · B&O 0.471%', url:'pages/us-wa.html' },
                { code:'TX', name:'德克萨斯州', badge:'us-other', desc:'州销售税6.25%' },
                { code:'NY', name:'纽约州', badge:'us-other', desc:'州销售税4%+地方' },
                { code:'FL', name:'佛罗里达州', badge:'us-other', desc:'州销售税6%' },
                { code:'IL', name:'伊利诺伊州', badge:'us-other', desc:'销售税6.25%' },
                { code:'PA', name:'宾夕法尼亚州', badge:'us-other', desc:'销售税6%' },
                { code:'OH', name:'俄亥俄州', badge:'us-other', desc:'销售税5.75%' },
                { code:'MA', name:'马萨诸塞州', badge:'us-other', desc:'销售税6.25%' },
                { code:'NV', name:'内华达州', badge:'us-other', desc:'销售税6.85%' },
            ];
            const asiaCards = [
                { name:'中国', badge:'special', desc:'增值税 · 企税25%', special: true },
                { name:'日本', badge:'other', desc:'消费税10% · 法人税' },
                { name:'韩国', badge:'other', desc:'增值税10%' },
                { name:'新加坡', badge:'other', desc:'GST 9%' },
                { name:'马来西亚', badge:'other', desc:'SST' },
                { name:'香港', badge:'other', desc:'利得税16.5%' },
            ];
            const euCards = [ { name:'英国', badge:'other', desc:'VAT 20%' } ];
            const otherCards = [ { name:'加拿大', badge:'other', desc:'GST 5%' }, { name:'澳大利亚', badge:'other', desc:'GST 10%' } ];

            function render(container, cards) {
                let html = '';
                cards.forEach(c => {
                    let badgeClass = c.badge || 'other';
                    let badgeText = { 'us-online':'已上线', 'us-other':'开发中', 'special':'特别', 'other':'待上线' }[badgeClass] || '待上线';
                    let onClick = c.url ? `window.location.href='${c.url}'` : `alert('${c.name} 税务开发中')`;
                    html += `<div class="card ${badgeClass}" onclick="${onClick}">
                        <div class="card-header">
                            <span class="card-title">${c.code ? c.code+' · ' : ''}${c.name}</span>
                            <span class="badge ${badgeClass === 'special' ? 'special-badge' : (badgeClass+'')}">${badgeText}</span>
                        </div>
                        <div class="card-desc">${c.desc}</div>
                    </div>`;
                });
                document.getElementById(container).innerHTML = html;
            }
            render('us-tab', usCards);
            render('asia-tab', asiaCards);
            render('eu-tab', euCards);
            render('other-tab', otherCards);

            // tab切换
            $('.tab').click(function() {
                $('.tab').removeClass('active');
                $(this).addClass('active');
                $('.card-grid').hide();
                $('#'+$(this).data('tab')).show();
            });
        }

        // AI助手与时间
        $(document).ready(function() {
            $('#ai-chat-toggle').click(function() { $('#ai-chat-window').toggleClass('show'); });
            $('#ai-chat-send').click(sendMsg);
            $('#ai-chat-input').keypress(function(e) { if(e.which === 13) sendMsg(); });
            function sendMsg() {
                let msg = $('#ai-chat-input').val().trim();
                if (!msg) return;
                $('#ai-chat-messages').append(`<div class="message user-message">${escapeHtml(msg)}</div>`);
                $('#ai-chat-input').val('');
                setTimeout(() => {
                    let reply = '🇺🇸 CA税率7.25% / WA 6.5%+地方';
                    $('#ai-chat-messages').append(`<div class="message ai-message">${reply}</div>`);
                }, 300);
            }
            function escapeHtml(unsafe) { return unsafe.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m])); }
            let d = new Date(); $('#update-time').text(`© 2026 · 更新于 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`);
        });
    </script>
</body>
</html>
