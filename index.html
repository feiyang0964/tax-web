<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外税务 · 全球视图</title>
    
    <!-- 加载 Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            line-height: 1.5;
            font-weight: 400;
        }

        /* 固定导航栏 - 深蓝色 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: #0b2b4f;
            display: flex;
            align-items: center;
            padding: 0 60px;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(0,20,40,0.15);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 32px;
            font-weight: 500;
            color: white;
            letter-spacing: 0.5px;
            margin-right: 60px;
        }
        
        .nav-brand span {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.85);
            font-size: 18px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-links a.active {
            color: white;
            border-bottom-color: #60a5fa;
        }

        /* 主内容区 */
        .main-content {
            max-width: 1400px;
            margin: 100px auto 40px;
            padding: 0 32px;
        }

        /* 标题系统 */
        h1 { font-size: 36px; font-weight: 500; color: #0f172a; margin-bottom: 8px; }
        h2 { font-size: 28px; font-weight: 500; margin-bottom: 20px; color: #1e293b; }
        h3 { font-size: 20px; font-weight: 500; margin-bottom: 16px; color: #334155; }

        /* 地图卡片 */
        .map-card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 32px;
            border: 1px solid #eef2f6;
        }

        .map-container {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
        }

        /* 图例 */
        .legend-bar {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 24px;
            background: #f1f5f9;
            border-radius: 40px;
            width: fit-content;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 14px;
        }
        .dot.blue-deep { background: #1e3a8a; }      /* 美国深蓝 */
        .dot.blue-light { background: #93c5fd; }     /* 已上线州浅蓝 */
        .dot.gray { background: #64748b; }           /* 待开发国家灰色 */
        .dot.white { background: #ffffff; border: 1px solid #cbd5e1; } /* 其他国家白色 */

        /* 快速入口卡片网格 */
        .quick-section {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 40px;
            width: fit-content;
            margin-bottom: 28px;
        }

        .tab {
            border: none;
            background: transparent;
            padding: 8px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 32px;
            color: #475569;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            color: #1e3a8a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .card:hover { background: #f1f5f9; transform: translateY(-2px); }
        .card.online { border-left-color: #93c5fd; }
        .card.other { border-left-color: #94a3b8; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: 17px;
            color: #0f172a;
        }
        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
        }
        .badge.online { background: #93c5fd; color: #1e3a8a; }
        .badge.other { background: #e2e8f0; color: #475569; }

        .card-desc {
            font-size: 14px;
            color: #64748b;
        }

        /* 美国专版样式 */
        .usa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        
        .usa-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .usa-card:hover { background: #f1f5f9; }
        .usa-card.online { border-left-color: #1e3a8a; }      /* 已上线深蓝 */
        .usa-card.other { border-left-color: #93c5fd; }       /* 其他州浅蓝 */

        footer {
            margin-top: 48px;
            padding: 24px 0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }

        /* AI助手 */
        .ai-chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }
        .ai-chat-toggle {
            width: 48px;
            height: 48px;
            background: #0b2b4f;
            border: none;
            border-radius: 48px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(11,43,79,0.25);
            color: white;
        }
        .ai-chat-window {
            position: absolute;
            bottom: 60px;
            right: 0;
            width: 320px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            display: none;
        }
        .ai-chat-window.show { display: block; }
        .ai-chat-header { padding: 16px; font-weight: 500; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .ai-chat-messages { height: 240px; padding: 12px; overflow-y: auto; font-size: 14px; }
        .message { margin-bottom: 10px; padding: 8px 14px; border-radius: 18px; max-width: 85%; }
        .user-message { background: #dbeafe; color: #1e293b; margin-left: auto; }
        .ai-message { background: #f1f5f9; color: #1e293b; margin-right: auto; }
        .ai-chat-input { display: flex; padding: 12px; border-top: 1px solid #e2e8f0; }
        .ai-chat-input input { flex:1; padding: 8px 14px; border:1px solid #e2e8f0; border-radius: 30px; outline:none; font-size:14px; }
        .ai-chat-input button { margin-left:8px; padding:0 18px; background:#0b2b4f; color:white; border:none; border-radius:30px; cursor:pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 固定导航栏 - 深蓝色 -->
    <div class="navbar">
        <div class="nav-brand">
            <span>🌐</span> 海外税务
        </div>
        <div class="nav-links">
            <a class="active" onclick="switchView('global')">全球视图</a>
            <a onclick="switchView('usa')">美国专版</a>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 全球视图 -->
        <div id="global-view">
            <h1>全球税务地图</h1>
            <div style="margin-bottom: 20px; font-size: 16px; color: #475569;">美国深蓝色 · 待开发国家灰色 · 点击CA/WA可跳转</div>
            
            <div class="map-card">
                <div id="world-map" class="map-container"></div>
                
                <div class="legend-bar">
                    <div class="legend-item"><span class="dot blue-deep"></span> 美国 (深蓝)</div>
                    <div class="legend-item"><span class="dot blue-light"></span> 已上线州 (CA/WA) 可点击</div>
                    <div class="legend-item"><span class="dot gray"></span> 待开发国家</div>
                    <div class="legend-item"><span class="dot white"></span> 其他国家</div>
                </div>
            </div>

            <!-- 快速入口 · 全球 -->
            <div class="quick-section">
                <h2>📌 快速入口 · 全球</h2>
                <div class="tab-bar">
                    <button class="tab active" data-tab="global-america">🌎 美洲</button>
                    <button class="tab" data-tab="global-asia">🌏 亚洲</button>
                    <button class="tab" data-tab="global-europe">🌍 欧洲</button>
                    <button class="tab" data-tab="global-oceania">🌏 大洋洲</button>
                </div>

                <div id="global-america" class="card-grid"></div>
                <div id="global-asia" class="card-grid" style="display: none;"></div>
                <div id="global-europe" class="card-grid" style="display: none;"></div>
                <div id="global-oceania" class="card-grid" style="display: none;"></div>
            </div>
        </div>

        <!-- 美国专版 -->
        <div id="usa-view" class="hidden">
            <h1>🇺🇸 美国税务专版</h1>
            <div style="margin-bottom: 20px; font-size: 16px; color: #475569;">深蓝色：已上线州 · 浅蓝色：其他州</div>
            
            <div class="map-card">
                <div id="usa-map" class="map-container"></div>
                
                <div class="legend-bar">
                    <div class="legend-item"><span class="dot blue-deep"></span> 已上线州 (CA/WA) 可点击跳转</div>
                    <div class="legend-item"><span class="dot blue-light"></span> 其他州 (开发中)</div>
                </div>
            </div>

            <!-- 快速入口 · 美国各州 (仅重点州) -->
            <div class="quick-section">
                <h2>📌 快速入口 · 美国重点州</h2>
                <div class="tab-bar">
                    <button class="tab active" data-tab="usa-online">✅ 已上线州</button>
                    <button class="tab" data-tab="usa-major">⭐ 主要大州</button>
                    <button class="tab" data-tab="usa-west">🌲 西部</button>
                    <button class="tab" data-tab="usa-east">🗽 东部</button>
                    <button class="tab" data-tab="usa-south">🌴 南部</button>
                </div>

                <div id="usa-online" class="usa-grid"></div>
                <div id="usa-major" class="usa-grid" style="display: none;"></div>
                <div id="usa-west" class="usa-grid" style="display: none;"></div>
                <div id="usa-east" class="usa-grid" style="display: none;"></div>
                <div id="usa-south" class="usa-grid" style="display: none;"></div>
            </div>
        </div>

        <footer>
            <span id="update-time"></span> · 数据仅供参考，以官方机构为准
        </footer>
    </div>

    <!-- AI助手 -->
    <div class="ai-chat-container">
        <button class="ai-chat-toggle" id="ai-chat-toggle">💬</button>
        <div class="ai-chat-window" id="ai-chat-window">
            <div class="ai-chat-header">🤖 税务助手</div>
            <div class="ai-chat-messages" id="ai-chat-messages">
                <div class="message ai-message">输入 CA/WA 税率或截止日</div>
            </div>
            <div class="ai-chat-input">
                <input id="ai-chat-input" placeholder="例如 CA 税率">
                <button id="ai-chat-send">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 视图切换
        window.switchView = function(view) {
            if (view === 'global') {
                $('#global-view').removeClass('hidden');
                $('#usa-view').addClass('hidden');
                $('.nav-links a').removeClass('active');
                $('.nav-links a:first-child').addClass('active');
            } else {
                $('#global-view').addClass('hidden');
                $('#usa-view').removeClass('hidden');
                $('.nav-links a').removeClass('active');
                $('.nav-links a:last-child').addClass('active');
                if (typeof drawUsaMap === 'function') setTimeout(drawUsaMap, 100);
            }
        };

        google.charts.load('current', { packages: ['geochart'] });
        google.charts.setOnLoadCallback(initMaps);

        function initMaps() {
            drawWorldMap();
            drawUsaMap();
            initGlobalCards();
            initUsaCards();
            initTabs();
        }

        // 世界地图：美国深蓝，待开发国家灰色，其他国家白色
        function drawWorldMap() {
            var rows = [
                // 美国各州 - 深蓝色 (值设为2)
                ['US-CA', 'CA', 2], ['US-WA', 'WA', 2], ['US-TX', 'TX', 2], ['US-NY', 'NY', 2],
                ['US-FL', 'FL', 2], ['US-IL', 'IL', 2], ['US-PA', 'PA', 2], ['US-OH', 'OH', 2],
                ['US-GA', 'GA', 2], ['US-NC', 'NC', 2], ['US-MI', 'MI', 2], ['US-NJ', 'NJ', 2],
                ['US-VA', 'VA', 2], ['US-MA', 'MA', 2], ['US-AZ', 'AZ', 2], ['US-CO', 'CO', 2],
                ['US-UT', 'UT', 2], ['US-NV', 'NV', 2], ['US-OR', 'OR', 2], ['US-ID', 'ID', 2],
                ['US-MT', 'MT', 2], ['US-WY', 'WY', 2], ['US-ND', 'ND', 2], ['US-SD', 'SD', 2],
                ['US-NE', 'NE', 2], ['US-KS', 'KS', 2], ['US-OK', 'OK', 2], ['US-AR', 'AR', 2],
                ['US-LA', 'LA', 2], ['US-MS', 'MS', 2], ['US-AL', 'AL', 2], ['US-TN', 'TN', 2],
                ['US-KY', 'KY', 2], ['US-IN', 'IN', 2], ['US-WV', 'WV', 2], ['US-SC', 'SC', 2],
                ['US-MD', 'MD', 2], ['US-DE', 'DE', 2], ['US-CT', 'CT', 2], ['US-RI', 'RI', 2],
                ['US-NH', 'NH', 2], ['US-VT', 'VT', 2], ['US-ME', 'ME', 2], ['US-HI', 'HI', 2],
                ['US-AK', 'AK', 2],
                
                // 待开发国家 - 灰色 (值设为3)
                ['CN', '中国', 3], ['SG', '新加坡', 3], ['MY', '马来西亚', 3], ['HK', '香港', 3],
                ['JP', '日本', 3], ['KR', '韩国', 3], ['GB', '英国', 3], ['AU', '澳大利亚', 3],
                ['CA', '加拿大', 3]
            ];

            var data = google.visualization.arrayToDataTable([
                ['Country', 'Name', 'Color'], ...rows
            ]);

            var options = {
                region: 'world',
                displayMode: 'regions',
                resolution: 'provinces',
                colorAxis: {
                    colors: ['#1e3a8a', '#64748b', '#ffffff'],
                    values: [2, 3]  // 2=深蓝(美国), 3=灰色(待开发), 其他白色
                },
                backgroundColor: '#ffffff',
                datalessRegionColor: '#ffffff',
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' }
            };

            var chart = new google.visualization.GeoChart(document.getElementById('world-map'));
            
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    
                    if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                    else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                    else if (code === 'CN') alert('🇨🇳 中国税务信息开发中');
                    else if (['SG','MY','HK','JP','KR','GB','AU','CA'].includes(code)) {
                        alert('该地区税务信息待开发');
                    } else if (code.startsWith('US-')) {
                        alert('美国' + code.split('-')[1] + '州税务开发中');
                    }
                }
            });
            
            chart.draw(data, options);
        }

        // 美国专版地图
        function drawUsaMap() {
            var rows = [
                ['US-CA', 'CA', 2], ['US-WA', 'WA', 2], ['US-TX', 'TX', 3], ['US-NY', 'NY', 3],
                ['US-FL', 'FL', 3], ['US-IL', 'IL', 3], ['US-PA', 'PA', 3], ['US-OH', 'OH', 3],
                ['US-GA', 'GA', 3], ['US-NC', 'NC', 3], ['US-MI', 'MI', 3], ['US-NJ', 'NJ', 3],
                ['US-VA', 'VA', 3], ['US-MA', 'MA', 3], ['US-AZ', 'AZ', 3], ['US-CO', 'CO', 3],
                ['US-UT', 'UT', 3], ['US-NV', 'NV', 3], ['US-OR', 'OR', 3], ['US-ID', 'ID', 3],
                ['US-MT', 'MT', 3], ['US-WY', 'WY', 3], ['US-ND', 'ND', 3], ['US-SD', 'SD', 3],
                ['US-NE', 'NE', 3], ['US-KS', 'KS', 3], ['US-OK', 'OK', 3], ['US-AR', 'AR', 3],
                ['US-LA', 'LA', 3], ['US-MS', 'MS', 3], ['US-AL', 'AL', 3], ['US-TN', 'TN', 3],
                ['US-KY', 'KY', 3], ['US-IN', 'IN', 3], ['US-WV', 'WV', 3], ['US-SC', 'SC', 3],
                ['US-MD', 'MD', 3], ['US-DE', 'DE', 3], ['US-CT', 'CT', 3], ['US-RI', 'RI', 3],
                ['US-NH', 'NH', 3], ['US-VT', 'VT', 3], ['US-ME', 'ME', 3], ['US-HI', 'HI', 3],
                ['US-AK', 'AK', 3]
            ];

            var data = google.visualization.arrayToDataTable([
                ['State', 'Name', 'Color'], ...rows
            ]);

            var options = {
                region: 'US',
                displayMode: 'regions',
                resolution: 'provinces',
                colorAxis: { colors: ['#1e3a8a', '#93c5fd'], values: [2,3] },
                backgroundColor: '#ffffff',
                datalessRegionColor: '#f1f5f9',
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' }
            };

            var chart = new google.visualization.GeoChart(document.getElementById('usa-map'));
            
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                    else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                    else alert(code + ' 税务开发中');
                }
            });
            
            chart.draw(data, options);
        }

        // 全球快速入口卡片
        function initGlobalCards() {
            const cards = {
                'global-america': [
                    { name:'美国 (CA)', code:'CA', desc:'已上线 · 销售税7.25%', type:'online' },
                    { name:'美国 (WA)', code:'WA', desc:'已上线 · 销售税6.5%', type:'online' },
                    { name:'加拿大', desc:'GST 5% · 待开发', type:'other' }
                ],
                'global-asia': [
                    { name:'中国', desc:'增值税 · 企税25%', type:'other' },
                    { name:'日本', desc:'消费税10% · 待开发', type:'other' },
                    { name:'韩国', desc:'增值税10% · 待开发', type:'other' },
                    { name:'新加坡', desc:'GST 9% · 待开发', type:'other' },
                    { name:'马来西亚', desc:'SST · 待开发', type:'other' },
                    { name:'香港', desc:'利得税16.5% · 待开发', type:'other' }
                ],
                'global-europe': [
                    { name:'英国', desc:'VAT 20% · 待开发', type:'other' }
                ],
                'global-oceania': [
                    { name:'澳大利亚', desc:'GST 10% · 待开发', type:'other' }
                ]
            };

            for (let tab in cards) {
                let html = '';
                cards[tab].forEach(c => {
                    let clickAction = c.code ? `window.location.href='pages/us-${c.code.toLowerCase()}.html'` : `alert('${c.name} 税务信息开发中')`;
                    html += `<div class="card ${c.type}" onclick="${clickAction}">
                        <div class="card-header">
                            <span class="card-title">${c.name}</span>
                            <span class="badge ${c.type}">${c.type === 'online' ? '已上线' : '待开发'}</span>
                        </div>
                        <div class="card-desc">${c.desc}</div>
                    </div>`;
                });
                $('#' + tab).html(html);
            }
        }

        // 美国重点州卡片
        function initUsaCards() {
            const cards = {
                'usa-online': [
                    { name:'加利福尼亚州', code:'CA', desc:'销售税7.25%+地方 · 企税8.84%', type:'online' },
                    { name:'华盛顿州', code:'WA', desc:'销售税6.5%+地方 · B&O 0.471%', type:'online' }
                ],
                'usa-major': [
                    { name:'德克萨斯州', code:'TX', desc:'州销售税6.25%', type:'other' },
                    { name:'纽约州', code:'NY', desc:'州销售税4%+地方', type:'other' },
                    { name:'佛罗里达州', code:'FL', desc:'州销售税6%', type:'other' },
                    { name:'伊利诺伊州', code:'IL', desc:'销售税6.25%', type:'other' },
                    { name:'宾夕法尼亚州', code:'PA', desc:'销售税6%', type:'other' }
                ],
