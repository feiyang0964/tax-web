<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外税务信息平台 · 全球视图</title>
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
            font-weight: 400;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: #0f3b73;
            background: linear-gradient(135deg, #1a4a8a 0%, #0f3b73 100%);
            display: flex;
            align-items: center;
            padding: 0 60px;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(15,59,115,0.25);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 32px;
            font-weight: 500;
            color: white;
            letter-spacing: 0.5px;
            margin-right: 60px;
        }
        
        .nav-brand span {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-links a.active {
            color: white;
            border-bottom-color: #ffffff;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown > a {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 240px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border: 1px solid #eef2f6;
            margin-top: 12px;
            overflow: hidden;
            z-index: 1001;
        }

        .dropdown:hover .dropdown-content,
        .dropdown-content.show {
            display: block;
        }

        .dropdown-item {
            padding: 14px 20px;
            font-size: 16px;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
        }

        .dropdown-item .state-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-item .state-code {
            font-weight: 600;
            color: #0f3b73;
            background: #e8f0fe;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
        }

        .dropdown-item .state-name {
            color: #1e293b;
            font-weight: 500;
        }

        .dropdown-item .link-icon {
            color: #0f3b73;
            font-size: 18px;
            opacity: 0.7;
        }

        /* 统一内容宽度1200px */
        .main-content {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 24px;
        }

        h1 { font-size: 36px; font-weight: 500; color: #0f172a; margin-bottom: 8px; letter-spacing: -0.01em; }
        h2 { font-size: 28px; font-weight: 500; margin-bottom: 20px; color: #1e293b; }
        h3 { font-size: 20px; font-weight: 500; margin-bottom: 16px; color: #334155; }
        .body-text { font-size: 16px; color: #334155; }
        .helper-text { font-size: 14px; color: #64748b; }

        .btn {
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-large { height: 45px; padding: 0 28px; font-size: 16px; }
        .btn-medium { height: 34px; padding: 0 22px; font-size: 15px; }
        .btn-small { height: 26px; padding: 0 16px; font-size: 14px; }
        .btn-primary { background: #0f3b73; color: white; }
        .btn-primary:hover { background: #0a2955; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-outline:hover { background: #f1f5f9; }

        .map-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 32px;
            border: 1px solid #eef2f6;
        }

        .map-container {
            width: 100%;
            height: 460px;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
        }

        .legend-bar {
            display: flex;
            gap: 36px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 28px;
            background: #f1f5f9;
            border-radius: 50px;
            width: fit-content;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 16px;
        }
        .dot.blue-us { background: #0f3b73; }
        .dot.blue-ca { background: #2d6cb8; }
        .dot.blue-light { background: #9ac0e8; }
        .dot.gray { background: #94a3b8; }
        .dot.white { background: #ffffff; border: 1px solid #cbd5e1; }

        .quick-section {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 40px;
            width: fit-content;
            margin-bottom: 28px;
        }

        .tab {
            border: none;
            background: transparent;
            padding: 8px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 32px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: white;
            color: #0f3b73;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* 全球卡片网格保持原样（自动填充） */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .card:hover { background: #f1f5f9; transform: translateY(-2px); }
        .card.online { border-left-color: #2d6cb8; }
        .card.other { border-left-color: #94a3b8; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: 17px;
            color: #0f172a;
        }
        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
        }
        .badge.online { background: #2d6cb8; color: white; }
        .badge.other { background: #e2e8f0; color: #475569; }

        .card-desc {
            font-size: 14px;
            color: #64748b;
        }

        /* 美国网格: 每行5个卡片，固定宽度 */
        .usa-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }
        
        .usa-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #0f3b73;
        }
        .usa-card:hover { background: #f1f5f9; }
        .usa-card.online { border-left-color: #2d6cb8; }
        .usa-card .state-code {
            font-weight: 600;
            font-size: 16px;
            color: #1e293b;
        }

        footer {
            margin-top: 48px;
            padding: 24px 0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }

        .ai-chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }
        .ai-chat-toggle {
            width: 48px;
            height: 48px;
            background: #0f3b73;
            border: none;
            border-radius: 48px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(15,59,115,0.3);
            color: white;
        }
        .ai-chat-window {
            position: absolute;
            bottom: 60px;
            right: 0;
            width: 320px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            display: none;
        }
        .ai-chat-window.show { display: block; }
        .ai-chat-header { 
            padding: 16px; 
            font-weight: 500; 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0;
            font-size: 16px;
        }
        .ai-chat-messages { height: 240px; padding: 12px; overflow-y: auto; font-size: 14px; }
        .message { margin-bottom: 10px; padding: 8px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; }
        .user-message { background: #dbeafe; color: #1e293b; margin-left: auto; }
        .ai-message { background: #f1f5f9; color: #1e293b; margin-right: auto; }
        .ai-chat-input { display: flex; padding: 12px; border-top: 1px solid #e2e8f0; }
        .ai-chat-input input { 
            flex:1; 
            padding: 8px 14px; 
            border:1px solid #e2e8f0; 
            border-radius: 30px; 
            outline:none; 
            font-size:14px;
        }
        .ai-chat-input button { 
            margin-left:8px; 
            padding:0 18px; 
            background:#0f3b73; 
            color:white; 
            border:none; 
            border-radius:30px; 
            cursor:pointer;
            font-size:14px;
            height: 34px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">
        <span>🌐</span> 海外税务信息平台
    </div>
    <div class="nav-links">
        <a class="active" onclick="switchView('global')">全球视图</a>
        <div class="dropdown">
            <a onclick="toggleDropdown()" class="dropdown-trigger">美国专版 ▾</a>
            <div class="dropdown-content" id="usa-dropdown">
                <div class="dropdown-item" onclick="window.location.href='pages/us-ca.html'">
                    <div class="state-info">
                        <span class="state-code">CA</span>
                        <span class="state-name">加利福尼亚州</span>
                    </div>
                    <span class="link-icon">↗</span>
                </div>
                <div class="dropdown-item" onclick="window.location.href='pages/us-wa.html'">
                    <div class="state-info">
                        <span class="state-code">WA</span>
                        <span class="state-name">华盛顿州</span>
                    </div>
                    <span class="link-icon">↗</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="global-view">
        <h1>全球税务地图</h1>
        <div class="helper-text" style="margin-bottom: 20px;">美国深蓝色 · 待开发国家灰色 · 其他国家白色 · 点击美国跳转专版</div>
        
        <div class="map-card">
            <div id="world-map" class="map-container"></div>
            <div class="legend-bar">
                <div class="legend-item"><span class="dot blue-us"></span> 美国 (已上线CA/WA)</div>
                <div class="legend-item"><span class="dot gray"></span> 待开发国家</div>
                <div class="legend-item"><span class="dot white"></span> 其他国家</div>
            </div>
        </div>

        <div class="quick-section">
            <h2>📌 快速入口 · 全球</h2>
            <div class="tab-bar">
                <button class="tab active" data-tab="global-america">🌎 美洲</button>
                <button class="tab" data-tab="global-asia">🌏 亚洲</button>
                <button class="tab" data-tab="global-europe">🌍 欧洲</button>
                <button class="tab" data-tab="global-oceania">🌏 大洋洲</button>
            </div>
            <div id="global-america" class="card-grid"></div>
            <div id="global-asia" class="card-grid" style="display: none;"></div>
            <div id="global-europe" class="card-grid" style="display: none;"></div>
            <div id="global-oceania" class="card-grid" style="display: none;"></div>
        </div>
    </div>

    <div id="usa-view" class="hidden">
        <h1>🇺🇸 美国税务专版</h1>
        <div class="helper-text" style="margin-bottom: 20px;">所有州显示中英文 · 深蓝色已上线 · 浅蓝色开发中</div>
        
        <div class="map-card">
            <div id="usa-map" class="map-container"></div>
            <div class="legend-bar">
                <div class="legend-item"><span class="dot blue-ca"></span> 已上线州 (CA/WA)</div>
                <div class="legend-item"><span class="dot blue-light"></span> 开发中州</div>
            </div>
        </div>

        <div class="quick-section">
            <h2>📌 快速入口 · 美国各州</h2>
            <div class="tab-bar">
                <button class="tab active" data-tab="usa-online">✅ 已上线</button>
                <button class="tab" data-tab="usa-west">🌄 西部</button>
                <button class="tab" data-tab="usa-central">🏙️ 中部</button>
                <button class="tab" data-tab="usa-east">🌆 东部</button>
            </div>
            <div id="usa-online" class="usa-grid"></div>
            <div id="usa-west" class="usa-grid" style="display: none;"></div>
            <div id="usa-central" class="usa-grid" style="display: none;"></div>
            <div id="usa-east" class="usa-grid" style="display: none;"></div>
        </div>
    </div>

    <footer>
        <span id="update-time"></span> · 数据仅供参考，以官方机构为准
    </footer>
</div>

<div class="ai-chat-container">
    <button class="ai-chat-toggle" id="ai-chat-toggle">💬</button>
    <div class="ai-chat-window" id="ai-chat-window">
        <div class="ai-chat-header">🤖 税务助手</div>
        <div class="ai-chat-messages" id="ai-chat-messages">
            <div class="message ai-message">输入 CA/WA 税率或截止日</div>
        </div>
        <div class="ai-chat-input">
            <input id="ai-chat-input" placeholder="例如 CA 税率">
            <button id="ai-chat-send">发送</button>
        </div>
    </div>
</div>

<script>
    window.switchView = function(view) {
        if (view === 'global') {
            $('#global-view').removeClass('hidden');
            $('#usa-view').addClass('hidden');
            $('.nav-links a').removeClass('active');
            $('.nav-links a:first-child').addClass('active');
        } else {
            $('#global-view').addClass('hidden');
            $('#usa-view').removeClass('hidden');
            $('.nav-links a').removeClass('active');
            $('.nav-links .dropdown > a').addClass('active');
            setTimeout(drawUsaMap, 100);
        }
    };

    window.toggleDropdown = function() {
        const dropdown = document.getElementById('usa-dropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };

    $(document).click(function(e) {
        if (!$(e.target).closest('.dropdown').length) {
            $('#usa-dropdown').hide();
        }
    });

    google.charts.load('current', { packages: ['geochart'] });
    google.charts.setOnLoadCallback(initMaps);

    function initMaps() {
        drawWorldMap();
        drawUsaMap();
        initGlobalCards();
        initUsaCards();
        initTabs();
    }

    function drawWorldMap() {
        var rows = [
            ['US', '美国', 2],
            ['CN', '中国', 3], ['SG', '新加坡', 3], ['MY', '马来西亚', 3], ['HK', '香港', 3],
            ['JP', '日本', 3], ['KR', '韩国', 3], ['GB', '英国', 3], ['AU', '澳大利亚', 3], ['CA', '加拿大', 3],
            ['DE', '德国', 4], ['FR', '法国', 4], ['IT', '意大利', 4], ['ES', '西班牙', 4],
            ['BR', '巴西', 4], ['IN', '印度', 4], ['RU', '俄罗斯', 4], ['ZA', '南非', 4]
        ];

        var data = google.visualization.arrayToDataTable([['Country', 'Name', 'Color'], ...rows]);

        var options = {
            region: 'world',
            displayMode: 'regions',
            resolution: 'countries',
            colorAxis: {
                colors: ['#0f3b73', '#94a3b8', '#ffffff'],
                minValue: 2,
                maxValue: 4,
                values: [2, 3, 4]
            },
            backgroundColor: '#ffffff',
            datalessRegionColor: '#ffffff',
            keepAspectRatio: false,
            width: '100%',
            height: '100%',
            tooltip: { 
                trigger: 'focus',
                isHtml: true,
                // 修改：只显示国家名称，不显示颜色数值
                formatter: (row, column) => {
                    return data.getValue(row, 1); // 只返回名称
                }
            }
        };

        var chart = new google.visualization.GeoChart(document.getElementById('world-map'));
        
        google.visualization.events.addListener(chart, 'select', function() {
            var sel = chart.getSelection();
            if (sel.length) {
                var row = sel[0].row;
                var code = data.getValue(row, 0);
                var name = data.getValue(row, 1);
                if (code === 'US') {
                    switchView('usa');
                } else if (['CN','SG','MY','HK','JP','KR','GB','AU','CA'].includes(code)) {
                    alert(`${name} 税务信息待开发中`);
                }
            }
        });
        
        chart.draw(data, options);
    }

    function drawUsaMap() {
        var rows = [
            ['US-CA', '加利福尼亚州(CA)', 2], ['US-WA', '华盛顿州(WA)', 2],
            ['US-OR', '俄勒冈州(OR)', 3], ['US-NV', '内华达州(NV)', 3], ['US-ID', '爱达荷州(ID)', 3],
            ['US-UT', '犹他州(UT)', 3], ['US-AZ', '亚利桑那州(AZ)', 3], ['US-CO', '科罗拉多州(CO)', 3],
            ['US-NM', '新墨西哥州(NM)', 3], ['US-MT', '蒙大拿州(MT)', 3], ['US-WY', '怀俄明州(WY)', 3],
            ['US-ND', '北达科他州(ND)', 3], ['US-SD', '南达科他州(SD)', 3], ['US-NE', '内布拉斯加州(NE)', 3],
            ['US-KS', '堪萨斯州(KS)', 3], ['US-OK', '俄克拉荷马州(OK)', 3], ['US-TX', '德克萨斯州(TX)', 3],
            ['US-MN', '明尼苏达州(MN)', 3], ['US-IA', '爱荷华州(IA)', 3], ['US-MO', '密苏里州(MO)', 3],
            ['US-AR', '阿肯色州(AR)', 3], ['US-LA', '路易斯安那州(LA)', 3], ['US-WI', '威斯康星州(WI)', 3],
            ['US-IL', '伊利诺伊州(IL)', 3], ['US-IN', '印第安纳州(IN)', 3], ['US-OH', '俄亥俄州(OH)', 3],
            ['US-MI', '密歇根州(MI)', 3], ['US-KY', '肯塔基州(KY)', 3], ['US-TN', '田纳西州(TN)', 3],
            ['US-AL', '阿拉巴马州(AL)', 3], ['US-MS', '密西西比州(MS)', 3],
            ['US-ME', '缅因州(ME)', 3], ['US-NH', '新罕布什尔州(NH)', 3], ['US-VT', '佛蒙特州(VT)', 3],
            ['US-MA', '马萨诸塞州(MA)', 3], ['US-RI', '罗德岛州(RI)', 3], ['US-CT', '康涅狄格州(CT)', 3],
            ['US-NY', '纽约州(NY)', 3], ['US-PA', '宾夕法尼亚州(PA)', 3], ['US-NJ', '新泽西州(NJ)', 3],
            ['US-DE', '特拉华州(DE)', 3], ['US-MD', '马里兰州(MD)', 3], ['US-WV', '西弗吉尼亚州(WV)', 3],
            ['US-VA', '弗吉尼亚州(VA)', 3], ['US-NC', '北卡罗来纳州(NC)', 3], ['US-SC', '南卡罗来纳州(SC)', 3],
            ['US-GA', '佐治亚州(GA)', 3], ['US-FL', '佛罗里达州(FL)', 3],
            ['US-HI', '夏威夷州(HI)', 3], ['US-AK', '阿拉斯加州(AK)', 3]
        ];

        var data = google.visualization.arrayToDataTable([['State', 'Name', 'Color'], ...rows]);

        var options = {
            region: 'US',
            displayMode: 'regions',
            resolution: 'provinces',
            colorAxis: { colors: ['#2d6cb8', '#9ac0e8'], values: [2, 3] },
            backgroundColor: '#ffffff',
            datalessRegionColor: '#f1f5f9',
            keepAspectRatio: false,
            width: '100%',
            height: '100%',
            tooltip: { 
                trigger: 'focus',
                isHtml: true,
                // 修改：只显示州名，不显示颜色值
                formatter: (row, column) => {
                    return data.getValue(row, 1); // 只返回名称
                }
            }
        };

        var chart = new google.visualization.GeoChart(document.getElementById('usa-map'));
        
        google.visualization.events.addListener(chart, 'select', function() {
            var sel = chart.getSelection();
            if (sel.length) {
                var row = sel[0].row;
                var code = data.getValue(row, 0);
                var name = data.getValue(row, 1);
                if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                else alert(`${name} 税务开发中`);
            }
        });
        
        chart.draw(data, options);
    }

    function initTabs() {
        $('.tab').click(function() {
            let parent = $(this).closest('.quick-section');
            parent.find('.tab').removeClass('active');

            let target = '#' + $(this).data('tab');
            parent.find('.card-grid, .usa-grid').hide();
            $(target).show();
        });
    }

    $(document).ready(function() {
        $('#ai-chat-toggle').click(function() { $('#ai-chat-window').toggleClass('show'); });
        $('#ai-chat-send').click(sendMsg);
        $('#ai-chat-input').keypress(function(e) { if(e.which === 13) sendMsg(); });
        
        function sendMsg() {
            let msg = $('#ai-chat-input').val().trim();
            if (!msg) return;
            $('#ai-chat-messages').append(`<div class="message user-message">${msg}</div>`);
            $('#ai-chat-input').val('');
            setTimeout(() => {
                let reply = 'CA税率7.25%+地方税 / WA税率6.5%+地方税 · 截止日:次月20日(CA)/25日(WA)';
                $('#ai-chat-messages').append(`<div class="message ai-message">${reply}</div>`);
                $('#ai-chat-messages').scrollTop($('#ai-chat-messages')[0].scrollHeight);
            }, 300);
        }
        
        let d = new Date();
        $('#update-time').text(`© 2026 · 数据更新于 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`);
