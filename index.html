<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外税务信息平台 · 全球视图</title>
    
    <!-- 加载 Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
            font-weight: 400;
        }

        /* 固定导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 48px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 36px;
            font-weight: 500;
            color: #0a2540;
            letter-spacing: -0.02em;
            margin-right: 48px;
        }
        
        .nav-brand span {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }

        .nav-links a.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        /* 主内容区 */
        .main-content {
            max-width: 1400px;
            margin: 92px auto 40px;
            padding: 0 32px;
        }

        /* 标题系统 */
        h1 { font-size: 36px; font-weight: 500; color: #0f172a; margin-bottom: 8px; }
        h2 { font-size: 28px; font-weight: 500; margin-bottom: 20px; color: #1e293b; }
        h3 { font-size: 20px; font-weight: 500; margin-bottom: 16px; color: #334155; }

        /* 地图卡片 */
        .map-card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 32px;
            border: 1px solid #eef2f6;
        }

        .map-container {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
        }

        /* 图例 */
        .legend-bar {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 20px;
            background: #f1f5f9;
            border-radius: 40px;
            width: fit-content;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 14px;
        }
        .dot.blue { background: #2563eb; }
        .dot.light-blue { background: #93c5fd; }
        .dot.gray { background: #94a3b8; }
        .dot.white { background: #ffffff; border: 1px solid #cbd5e1; }
        .dot.special { background: #dc2626; }  /* 中国标记红色 */

        /* 快速入口卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .card:hover { background: #f1f5f9; transform: translateY(-2px); }
        .card.online { border-left-color: #93c5fd; }
        .card.develop { border-left-color: #94a3b8; }
        .card.special { border-left-color: #dc2626; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: 17px;
            color: #0f172a;
        }
        .badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
        }
        .badge.online { background: #93c5fd; color: #1e3a8a; }
        .badge.develop { background: #e2e8f0; color: #475569; }
        .badge.special { background: #dc2626; color: white; }

        .card-desc {
            font-size: 14px;
            color: #64748b;
        }

        /* 美国专版专用样式 */
        .state-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 24px;
        }
        .state-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 8px 6px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .state-item:hover {
            background: #e2e8f0;
        }
        .state-item.online {
            background: #dbeafe;
            border-color: #2563eb;
        }
        .state-code {
            font-weight: 600;
            color: #1e293b;
        }

        footer {
            margin-top: 48px;
            padding: 24px 0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }

        /* AI助手 */
        .ai-chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
        }
        .ai-chat-toggle {
            width: 48px;
            height: 48px;
            background: #2563eb;
            border: none;
            border-radius: 48px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(37,99,235,0.2);
            color: white;
        }
        .ai-chat-window {
            position: absolute;
            bottom: 60px;
            right: 0;
            width: 320px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            display: none;
        }
        .ai-chat-window.show { display: block; }
        .ai-chat-header { padding: 16px; font-weight: 500; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .ai-chat-messages { height: 240px; padding: 12px; overflow-y: auto; font-size: 14px; }
        .message { margin-bottom: 10px; padding: 8px 14px; border-radius: 18px; max-width: 85%; }
        .user-message { background: #dbeafe; color: #1e293b; margin-left: auto; }
        .ai-message { background: #f1f5f9; color: #1e293b; margin-right: auto; }
        .ai-chat-input { display: flex; padding: 12px; border-top: 1px solid #e2e8f0; }
        .ai-chat-input input { flex:1; padding: 8px 14px; border:1px solid #e2e8f0; border-radius: 30px; outline:none; font-size:14px; }
        .ai-chat-input button { margin-left:8px; padding:0 18px; background:#2563eb; color:white; border:none; border-radius:30px; cursor:pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 固定导航栏 -->
    <div class="navbar">
        <div class="nav-brand">
            <span>🌐</span> 海外税务
        </div>
        <div class="nav-links">
            <a class="active" onclick="switchView('global')">全球视图</a>
            <a onclick="switchView('usa')">美国专版</a>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 全球视图 -->
        <div id="global-view">
            <h1>全球税务地图</h1>
            <div style="margin-bottom: 20px; font-size: 16px; color: #475569;">点击地图区域查看详情 · 中国🇨🇳红色标记</div>
            
            <div class="map-card">
                <div id="world-map" class="map-container"></div>
                
                <div class="legend-bar">
                    <div class="legend-item"><span class="dot blue"></span> 美国 (已上线CA/WA)</div>
                    <div class="legend-item"><span class="dot light-blue"></span> 已上线州 (可点击跳转)</div>
                    <div class="legend-item"><span class="dot gray"></span> 待开发国家</div>
                    <div class="legend-item"><span class="dot white"></span> 其他国家</div>
                    <div class="legend-item"><span class="dot special"></span> 中国</div>
                </div>
            </div>

            <!-- 全球快速入口 -->
            <div class="map-card">
                <h2>📌 快速入口 · 全球</h2>
                <div id="global-cards" class="card-grid"></div>
            </div>
        </div>

        <!-- 美国专版 (初始隐藏) -->
        <div id="usa-view" class="hidden">
            <h1>🇺🇸 美国税务专版</h1>
            <div style="margin-bottom: 20px; font-size: 16px; color: #475569;">点击州可查看详情 · 已上线州为浅蓝色</div>
            
            <div class="map-card">
                <div id="usa-map" class="map-container"></div>
                
                <div class="legend-bar">
                    <div class="legend-item"><span class="dot light-blue"></span> 已上线州 (CA/WA) 可点击跳转</div>
                    <div class="legend-item"><span class="dot blue"></span> 其他州 (开发中)</div>
                </div>
            </div>

            <!-- 美国所有州快速入口 (网格) -->
            <div class="map-card">
                <h2>📌 美国各州快速入口</h2>
                <div id="usa-states-grid" class="state-grid"></div>
            </div>
        </div>

        <footer>
            <span id="update-time"></span> · 数据仅供参考，以官方机构为准
        </footer>
    </div>

    <!-- AI助手 -->
    <div class="ai-chat-container">
        <button class="ai-chat-toggle" id="ai-chat-toggle">💬</button>
        <div class="ai-chat-window" id="ai-chat-window">
            <div class="ai-chat-header">🤖 税务助手</div>
            <div class="ai-chat-messages" id="ai-chat-messages">
                <div class="message ai-message">输入 CA/WA 税率或截止日</div>
            </div>
            <div class="ai-chat-input">
                <input id="ai-chat-input" placeholder="例如 CA 税率">
                <button id="ai-chat-send">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 视图切换
        window.switchView = function(view) {
            if (view === 'global') {
                $('#global-view').removeClass('hidden');
                $('#usa-view').addClass('hidden');
                $('.nav-links a').removeClass('active');
                $('.nav-links a:first-child').addClass('active');
            } else {
                $('#global-view').addClass('hidden');
                $('#usa-view').removeClass('hidden');
                $('.nav-links a').removeClass('active');
                $('.nav-links a:last-child').addClass('active');
                // 确保美国地图重绘 (如果已加载)
                if (typeof drawUsaMap === 'function') setTimeout(drawUsaMap, 100);
            }
        };

        google.charts.load('current', { packages: ['geochart'] });
        google.charts.setOnLoadCallback(initMaps);

        function initMaps() {
            drawWorldMap();
            drawUsaMap();
            initCards();
            initUsaStatesGrid();
        }

        // 世界地图：美国各州细分，其他国家显示国家名
        function drawWorldMap() {
            // 构建数据：美国每个州 + 主要国家
            var rows = [
                // 美国所有州 (蓝色基调)
                ['US-CA', 'CA', 2], ['US-WA', 'WA', 2], ['US-TX', 'TX', 3], ['US-NY', 'NY', 3],
                ['US-FL', 'FL', 3], ['US-IL', 'IL', 3], ['US-PA', 'PA', 3], ['US-OH', 'OH', 3],
                ['US-GA', 'GA', 3], ['US-NC', 'NC', 3], ['US-MI', 'MI', 3], ['US-NJ', 'NJ', 3],
                ['US-VA', 'VA', 3], ['US-MA', 'MA', 3], ['US-AZ', 'AZ', 3], ['US-CO', 'CO', 3],
                ['US-UT', 'UT', 3], ['US-NV', 'NV', 3], ['US-OR', 'OR', 3], ['US-ID', 'ID', 3],
                ['US-MT', 'MT', 3], ['US-WY', 'WY', 3], ['US-ND', 'ND', 3], ['US-SD', 'SD', 3],
                ['US-NE', 'NE', 3], ['US-KS', 'KS', 3], ['US-OK', 'OK', 3], ['US-AR', 'AR', 3],
                ['US-LA', 'LA', 3], ['US-MS', 'MS', 3], ['US-AL', 'AL', 3], ['US-TN', 'TN', 3],
                ['US-KY', 'KY', 3], ['US-IN', 'IN', 3], ['US-WV', 'WV', 3], ['US-SC', 'SC', 3],
                ['US-MD', 'MD', 3], ['US-DE', 'DE', 3], ['US-CT', 'CT', 3], ['US-RI', 'RI', 3],
                ['US-NH', 'NH', 3], ['US-VT', 'VT', 3], ['US-ME', 'ME', 3], ['US-HI', 'HI', 3],
                ['US-AK', 'AK', 3],
                
                // 主要国家 (灰色待开发)
                ['CN', '中国', 4],  // 中国用红色 (4)
                ['SG', '新加坡', 5], ['MY', '马来西亚', 5], ['HK', '香港', 5],
                ['JP', '日本', 5], ['KR', '韩国', 5], ['GB', '英国', 5],
                ['AU', '澳大利亚', 5], ['CA', '加拿大', 5],
                // 其他国家默认白色
            ];

            var data = google.visualization.arrayToDataTable([
                ['Country', 'Name', 'Color'], ...rows
            ]);

            var options = {
                region: 'world',
                displayMode: 'regions',
                resolution: 'provinces',  // 使美国显示州级
                colorAxis: {
                    colors: ['#2563eb', '#93c5fd', '#3b82f6', '#dc2626', '#94a3b8', '#ffffff'],
                    values: [2, 3, 4, 5]  // 2=已上线浅蓝, 3=其他州深蓝, 4=中国红, 5=灰色
                },
                backgroundColor: '#ffffff',
                datalessRegionColor: '#ffffff',  // 其他国家白色
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' }
            };

            var chart = new google.visualization.GeoChart(document.getElementById('world-map'));
            
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    
                    // 美国已上线州跳转
                    if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                    else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                    // 其他国家提示
                    else if (code === 'CN') alert('🇨🇳 中国税务信息开发中');
                    else if (['SG','MY','HK','JP','KR','GB','AU','CA'].includes(code)) {
                        alert('该地区税务信息待开发');
                    } else if (code.startsWith('US-')) {
                        alert('美国' + code.split('-')[1] + '州税务开发中');
                    }
                }
            });
            
            chart.draw(data, options);
        }

        // 美国专版地图 (所有州显示)
        function drawUsaMap() {
            var rows = [];
            var states = [
                ['CA','加利福尼亚',2], ['WA','华盛顿',2], ['TX','德克萨斯',3], ['NY','纽约',3],
                ['FL','佛罗里达',3], ['IL','伊利诺伊',3], ['PA','宾夕法尼亚',3], ['OH','俄亥俄',3],
                ['GA','佐治亚',3], ['NC','北卡罗来纳',3], ['MI','密歇根',3], ['NJ','新泽西',3],
                ['VA','弗吉尼亚',3], ['MA','马萨诸塞',3], ['AZ','亚利桑那',3], ['CO','科罗拉多',3],
                ['UT','犹他',3], ['NV','内华达',3], ['OR','俄勒冈',3], ['ID','爱达荷',3],
                ['MT','蒙大拿',3], ['WY','怀俄明',3], ['ND','北达科他',3], ['SD','南达科他',3],
                ['NE','内布拉斯加',3], ['KS','堪萨斯',3], ['OK','俄克拉荷马',3], ['AR','阿肯色',3],
                ['LA','路易斯安那',3], ['MS','密西西比',3], ['AL','阿拉巴马',3], ['TN','田纳西',3],
                ['KY','肯塔基',3], ['IN','印第安纳',3], ['WV','西弗吉尼亚',3], ['SC','南卡罗来纳',3],
                ['MD','马里兰',3], ['DE','特拉华',3], ['CT','康涅狄格',3], ['RI','罗德岛',3],
                ['NH','新罕布什尔',3], ['VT','佛蒙特',3], ['ME','缅因',3], ['HI','夏威夷',3],
                ['AK','阿拉斯加',3]
            ];
            states.forEach(s => rows.push(['US-'+s[0], s[1], s[2]]));

            var data = google.visualization.arrayToDataTable([
                ['State', 'Name', 'Color'], ...rows
            ]);

            var options = {
                region: 'US',
                displayMode: 'regions',
                resolution: 'provinces',
                colorAxis: { colors: ['#93c5fd', '#3b82f6'], values: [2,3] },
                backgroundColor: '#ffffff',
                datalessRegionColor: '#f1f5f9',
                keepAspectRatio: false,
                width: '100%',
                height: '100%',
                tooltip: { trigger: 'focus' }
            };

            var chart = new google.visualization.GeoChart(document.getElementById('usa-map'));
            
            google.visualization.events.addListener(chart, 'select', function() {
                var sel = chart.getSelection();
                if (sel.length) {
                    var row = sel[0].row;
                    var code = data.getValue(row, 0);
                    if (code === 'US-CA') window.location.href = 'pages/us-ca.html';
                    else if (code === 'US-WA') window.location.href = 'pages/us-wa.html';
                    else alert(code + ' 税务开发中');
                }
            });
            
            chart.draw(data, options);
        }

        // 全球快速入口卡片
        function initCards() {
            const globalCards = [
                { name:'美国 (CA)', desc:'已上线' , type:'online', code:'CA' },
                { name:'美国 (WA)', desc:'已上线 ', type:'online', code:'WA' },
                { name:'中国', desc:'增值税 · 企税25%', type:'special' },
                { name:'新加坡', desc:'GST 9% · 待开发', type:'develop' },
                { name:'日本', desc:'消费税10% · 待开发', type:'develop' },
                { name:'韩国', desc:'增值税10% · 待开发', type:'develop' },
                { name:'英国', desc:'VAT 20% · 待开发', type:'develop' },
                { name:'澳大利亚', desc:'GST 10% · 待开发', type:'develop' },
                { name:'加拿大', desc:'GST 5% · 待开发', type:'develop' },
                { name:'马来西亚', desc:'SST · 待开发', type:'develop' },
                { name:'香港', desc:'利得税16.5% · 待开发', type:'develop' }
            ];

            let html = '';
            globalCards.forEach(c => {
                let typeClass = c.type;
                let badgeText = { online:'已上线', special:'特别', develop:'待开发' }[c.type];
                let clickAction = c.code ? `window.location.href='pages/us-${c.code.toLowerCase()}.html'` : `alert('${c.name} 税务信息开发中')`;
                html += `<div class="card ${typeClass}" onclick="${clickAction}">
                    <div class="card-header">
                        <span class="card-title">${c.name}</span>
                        <span class="badge ${typeClass}">${badgeText}</span>
                    </div>
                    <div class="card-desc">${c.desc}</div>
                </div>`;
            });
            document.getElementById('global-cards').innerHTML = html;
        }

        // 美国各州网格 (所有州)
        function initUsaStatesGrid() {
            const states = [
                ['CA', '加利福尼亚', true], ['WA', '华盛顿', true], ['TX', '德克萨斯'], ['NY', '纽约'],
                ['FL', '佛罗里达'], ['IL', '伊利诺伊'], ['PA', '宾夕法尼亚'], ['OH', '俄亥俄'],
                ['GA', '佐治亚'], ['NC', '北卡罗来纳'], ['MI', '密歇根'], ['NJ', '新泽西'],
                ['VA', '弗吉尼亚'], ['MA', '马萨诸塞'], ['AZ', '亚利桑那'], ['CO', '科罗拉多'],
                ['UT', '犹他'], ['NV', '内华达'], ['OR', '俄勒冈'], ['ID', '爱达荷'],
                ['MT', '蒙大拿'], ['WY', '怀俄明'], ['ND', '北达科他'], ['SD', '南达科他'],
                ['NE', '内布拉斯加'], ['KS', '堪萨斯'], ['OK', '俄克拉荷马'], ['AR', '阿肯色'],
                ['LA', '路易斯安那'], ['MS', '密西西比'], ['AL', '阿拉巴马'], ['TN', '田纳西'],
                ['KY', '肯塔基'], ['IN', '印第安纳'], ['WV', '西弗吉尼亚'], ['SC', '南卡罗来纳'],
                ['MD', '马里兰'], ['DE', '特拉华'], ['CT', '康涅狄格'], ['RI', '罗德岛'],
                ['NH', '新罕布什尔'], ['VT', '佛蒙特'], ['ME', '缅因'], ['HI', '夏威夷'],
                ['AK', '阿拉斯加']
            ];

            let html = '';
            states.forEach(s => {
                let online = s[2] || false;
                let clickAction = online ? `window.location.href='pages/us-${s[0].toLowerCase()}.html'` : `alert('${s[1]}州税务开发中')`;
                html += `<div class="state-item ${online ? 'online' : ''}" onclick="${clickAction}">
                    <div class="state-code">${s[0]}</div>
                    <div style="font-size:12px;">${s[1]}</div>
                </div>`;
            });
            document.getElementById('usa-states-grid').innerHTML = html;
        }

        // AI助手功能
        $(document).ready(function() {
            $('#ai-chat-toggle').click(function() { $('#ai-chat-window').toggleClass('show'); });
            $('#ai-chat-send').click(sendMsg);
            $('#ai-chat-input').keypress(function(e) { if(e.which === 13) sendMsg(); });
            
            function sendMsg() {
                let msg = $('#ai-chat-input').val().trim();
                if (!msg) return;
                $('#ai-chat-messages').append(`<div class="message user-message">${escapeHtml(msg)}</div>`);
                $('#ai-chat-input').val('');
                setTimeout(() => {
                    let reply = 'CA税率7.25% / WA税率6.5%+地方 · 截止日:次月20日(CA)/25日(WA)';
                    $('#ai-chat-messages').append(`<div class="message ai-message">${reply}</div>`);
                    $('#ai-chat-messages').scrollTop($('#ai-chat-messages')[0].scrollHeight);
                }, 300);
            }
            
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
            }
            
            let d = new Date();
            $('#update-time').text(`© 2026 · 更新于 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`);
        });
    </script>
</body>
</html>
